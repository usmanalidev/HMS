<app-page-header title="Patients" subtitle="Search and filter the patient registry">
  <a mat-flat-button color="primary" pageHeaderActions [routerLink]="[patientsPath, 'new']">
    Register patient
  </a>
</app-page-header>

<div class="filters">
  <mat-form-field appearance="outline">
    <mat-label>Status</mat-label>
    <mat-select [formControl]="statusControl">
      @for (status of statusOptions; track status) {
        <mat-option [value]="status">{{ status || 'All statuses' }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Department</mat-label>
    <mat-select [formControl]="departmentControl">
      @for (dept of departmentOptions; track dept) {
        <mat-option [value]="dept">{{ dept || 'All departments' }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>

@if (loading()) {
  <app-loading-skeleton [rows]="10" [columns]="4" />
} @else {
  <app-data-table
    [columns]="columns"
    [data]="patients()"
    [clientSide]="true"
    searchPlaceholder="Search patients…"
  />
}
