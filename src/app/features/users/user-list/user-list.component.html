<app-page-header title="User management" subtitle="Admin-only staff directory">
  <a mat-stroked-button pageHeaderActions routerLink="..">Back</a>
</app-page-header>

@if (loading()) {
  <app-loading-skeleton [rows]="8" [columns]="5" />
} @else {
  <app-data-table
    [columns]="columns"
    [data]="users()"
    [clientSide]="false"
    [paginated]="true"
    [totalLength]="total()"
    [pageSize]="pageSize()"
    searchPlaceholder="Search users…"
    (pageChange)="onPage($event)"
    (searchChange)="onSearch($event)"
  />
}
