<!--
  LEARNING: Semantic header + breadcrumb nav improves accessibility and screen-reader flow.
-->
<header class="page-header">
  <div class="page-header__main">
    @if (breadcrumbs.length > 0) {
      <nav class="page-header__breadcrumbs" aria-label="Breadcrumb">
        <ol>
          @for (crumb of breadcrumbs; track crumb.label; let last = $last) {
            <li>
              @if (!last && crumb.route) {
                <a [routerLink]="crumb.route">{{ crumb.label }}</a>
              } @else {
                <span [attr.aria-current]="last ? 'page' : null">{{ crumb.label }}</span>
              }
            </li>
          }
        </ol>
      </nav>
    }

    <div class="page-header__titles">
      <h1 class="page-header__title">{{ title }}</h1>
      @if (subtitle) {
        <p class="page-header__subtitle">{{ subtitle }}</p>
      }
    </div>
  </div>

  <div class="page-header__actions">
    <ng-content select="[pageHeaderActions]" />
  </div>
</header>
